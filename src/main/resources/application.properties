spring.application.name=YouTube MP3 Downloader
server.port=8080

# Ruta a yt-dlp (sobreescribible con la variable de entorno YTDLP_PATH)
ytdlp.path=${YTDLP_PATH:${user.home}/.local/bin/yt-dlp}
# Ruta a ffmpeg (solo necesario si no está en el PATH del sistema)
ffmpeg.path=${FFMPEG_PATH:}

# Timeout para requests asincronos (10 minutos)
spring.mvc.async.request-timeout=600000
